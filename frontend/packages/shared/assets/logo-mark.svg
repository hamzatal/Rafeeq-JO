  <path d="M256 60 A 196 196 0 0 1 452 256" fill="none" stroke="url(#rfqArc)" stroke-width="16" stroke-linecap="round"/>
  <circle cx="452" cy="256" r="16" fill="#F2C14E"/>

  <!-- Geometric Arabic "ر" lettermark -->
  <path d="M170 196
           C 170 300, 250 330, 348 300"
        fill="none" stroke="#FFFFFF" stroke-width="34" stroke-linecap="round"/>
  <circle cx="356" cy="356" r="20" fill="#FFFFFF"/>
</svg>
