<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rafeeq">
  <defs>
    <linearGradient id="rfqCircle" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="0.5" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="rfqArc" x1="120" y1="120" x2="392" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2C14E"/>
      <stop offset="1" stop-color="#D4A017"/>
    </linearGradient>
  </defs>

  <!-- Circular emblem -->
  <circle cx="256" cy="256" r="240" fill="url(#rfqCircle)"/>

  <!-- Orbital ring (companionship / motion) -->
