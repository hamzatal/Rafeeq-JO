name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend:
    name: Backend (Laravel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, sqlite3, pdo_sqlite, redis
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Lint (php -l) all source files
        run: |
          find Core Shared Infrastructure Modules database config bootstrap -name "*.php" -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null

      - name: Static analysis (PHPStan / Larastan, level 5 + baseline)
        run: php -d memory_limit=1G vendor/bin/phpstan analyse --no-progress --error-format=github

      - name: Boot smoke test (registers every module + route)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
        run: |
          php artisan route:list > /dev/null
          php artisan config:clear

      - name: Run PHPUnit tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
        run: php artisan test

  database:
    name: Database (PostgreSQL migrations + seed)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rafeeq
          POSTGRES_USER: rafeeq
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rafeeq"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pgsql, pdo_pgsql
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Migrate + seed on PostgreSQL
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: rafeeq
          DB_USERNAME: rafeeq
          DB_PASSWORD: secret
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
        run: |
          php artisan migrate:fresh --force
          php artisan db:seed --force

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Use install (not ci) so the lockfile is refreshed for newly added deps.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck shared packages + apps
        run: |
          npm run typecheck --workspace=student-app
          npm run typecheck --workspace=driver-app
          npm run typecheck --workspace=admin-dashboard

      - name: Lint admin dashboard
        run: npm run lint --workspace=admin-dashboard
