name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend:
    name: Backend (Laravel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, sqlite3, pdo_sqlite, redis
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Lint (php -l) all source files
        run: |
          find Core Shared Infrastructure Modules database config bootstrap -name "*.php" -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null

      - name: Boot smoke test (registers every module + route)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
        run: |
          php artisan route:list > /dev/null
          php artisan config:clear

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Use install (not ci) so the lockfile is refreshed for newly added deps.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck shared packages + apps
        run: |
          npm run typecheck --workspace=student-app
          npm run typecheck --workspace=driver-app
          npm run typecheck --workspace=admin-dashboard

      - name: Lint admin dashboard
        run: npm run lint --workspace=admin-dashboard || true
