<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>رفيق — معرض التصاميم (20 اتجاه × 4 شاشات)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Reem+Kufi:wght@500;600;700&family=Sora:wght@600;700;800&family=Tajawal:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root { --page:#0b0e13; --panel:#141a22; --panel2:#1b222c; --line:#28303b; --ftext:#e8edf3; --fmuted:#94a1b2; --hi:#2F6BFF; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Cairo',system-ui,sans-serif; background:var(--page); color:var(--ftext); }
  a { color:inherit; }

  header.top { position:sticky; top:0; z-index:100; background:rgba(11,14,19,.94); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); padding:16px 22px; }
  header.top h1 { font-size:21px; font-weight:900; }
  header.top p { color:var(--fmuted); font-size:13px; margin-top:5px; line-height:1.7; max-width:1000px; }
  .jump { display:flex; gap:6px; flex-wrap:wrap; margin-top:12px; }
  .jump a { font-size:12px; font-weight:800; width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:9px; background:var(--panel2); border:1px solid var(--line); text-decoration:none; transition:.15s; }
  .jump a:hover { background:var(--hi); border-color:var(--hi); }

  .wrap { max-width:1180px; margin:0 auto; padding:10px 22px 100px; }
  .design { border:1px solid var(--line); background:var(--panel); border-radius:22px; padding:20px; margin-top:26px; scroll-margin-top:120px; }
  .dtitle { display:flex; align-items:center; gap:12px; }
  .dnum { flex:0 0 auto; width:34px; height:34px; border-radius:50%; background:var(--hi); color:#fff; font-weight:900; display:flex; align-items:center; justify-content:center; font-size:15px; }
  .dtitle h2 { font-size:20px; font-weight:900; }
  .dtitle .en { font-size:12px; color:var(--fmuted); font-weight:700; letter-spacing:.4px; margin-top:2px; }
  .why { color:var(--fmuted); font-size:13px; line-height:1.8; margin:12px 0 6px; }

  /* brand bar — bilingual distinctive wordmark */
  .brandbar { display:flex; gap:26px; align-items:center; flex-wrap:wrap; background:var(--panel2); border:1px solid var(--line); border-radius:16px; padding:14px 18px; margin:14px 0 18px; }
  .brandbar .cap { font-size:11px; color:var(--fmuted); font-weight:700; }
  .wm { display:inline-flex; align-items:center; gap:10px; }
  .wm .mark { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:22px; box-shadow:0 4px 12px rgba(0,0,0,.3); position:relative; }
  .wm .mark::after { content:''; position:absolute; top:-3px; left:-3px; width:9px; height:9px; border-radius:50%; border:2px solid var(--page); }
  .wm .txt-ar { font-family:'Reem Kufi',serif; font-weight:700; font-size:30px; line-height:1; letter-spacing:-.5px; }
  .wm .txt-en { font-family:'Sora',sans-serif; font-weight:800; font-size:26px; line-height:1; letter-spacing:-.5px; }
  .wm .dot { color:var(--wm-accent); }

  .phones { display:flex; gap:16px; overflow-x:auto; padding:6px 2px 14px; }
  .pcol { flex:0 0 auto; }
  .plabel { text-align:center; font-size:12px; font-weight:800; color:var(--fmuted); margin-bottom:8px; }
  .phone { width:246px; height:534px; background:#0a0a0a; border-radius:34px; padding:8px; box-shadow:0 16px 34px rgba(0,0,0,.5); }
  .screen { width:100%; height:100%; border-radius:27px; overflow:hidden; position:relative; display:flex; flex-direction:column; background:var(--bg); color:var(--text); font-size:13px; }
  .sb { display:flex; justify-content:space-between; padding:9px 16px 3px; font-size:11px; font-weight:800; }
  .sb.ink { color:#fff; }

  /* wordmark inside app header */
  .apphdr { display:flex; align-items:center; justify-content:space-between; padding:6px 14px 10px; }
  .apphdr .wmini { display:flex; align-items:center; gap:7px; }
  .apphdr .wmini .m { width:30px; height:30px; border-radius:9px; background:var(--accent); color:var(--onAccent); font-weight:900; display:flex; align-items:center; justify-content:center; font-size:16px; font-family:'Reem Kufi',serif; }
  .apphdr .wmini .w { font-family:'Reem Kufi',serif; font-weight:700; font-size:20px; color:var(--text); }
  .apphdr .av { width:36px; height:36px; border-radius:50%; background:var(--accent); color:var(--onAccent); display:flex; align-items:center; justify-content:center; font-weight:800; }
  .htitle { font-size:19px; font-weight:900; padding:4px 16px 12px; }

  .body { flex:1; overflow-y:auto; padding:0 14px; }
  .body::-webkit-scrollbar{ display:none; }

  .hero { background:var(--ink); color:#fff; border-radius:18px; padding:15px; position:relative; overflow:hidden; }
  .hero .g { position:absolute; width:130px; height:130px; border-radius:50%; background:var(--accent); opacity:.25; filter:blur(30px); top:-34px; left:-24px; }
  .hero .l { font-size:12px; opacity:.82; }
  .hero .b { font-size:26px; font-weight:900; margin-top:3px; }
  .hero .b small { font-size:12px; opacity:.75; font-weight:700; }
  .hero .row { display:flex; gap:8px; margin-top:12px; position:relative; }
  .hero .qa { flex:1; background:rgba(255,255,255,.14); border:none; color:#fff; height:34px; border-radius:10px; font-weight:800; font-size:12px; font-family:inherit; }
  .hero .qa.solid { background:var(--accent); color:var(--onAccent); }

  .tiles { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:14px; }
  .tile { text-align:center; }
  .tile .ic { width:48px; height:48px; margin:0 auto; border-radius:15px; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:20px; }
  .tile .t { font-size:10px; margin-top:5px; font-weight:700; }

  .sec { font-size:13px; font-weight:900; margin:15px 2px 9px; display:flex; justify-content:space-between; }
  .sec .more { color:var(--accent); font-size:11px; font-weight:800; }

  .cta { width:100%; height:48px; border-radius:14px; background:var(--accent); color:var(--onAccent); border:none; font-weight:900; font-size:14px; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:7px; }

  .triprow { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:10px 12px; margin-bottom:8px; }
  .triprow .rt { flex:1; }
  .triprow .rt .a { font-weight:800; font-size:12.5px; }
  .triprow .rt .b { font-size:10.5px; color:var(--muted); margin-top:2px; }
  .triprow .pr { font-weight:900; font-size:13px; }
  .pill { font-size:10px; font-weight:800; padding:3px 9px; border-radius:999px; }
  .pill.ok { background:#12B76A22; color:#0E9F6E; }
  .pill.go { background:var(--accentSoft); color:var(--accent); }

  .nav { height:60px; background:var(--surface); border-top:1px solid var(--border); display:flex; }
  .nav .n { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; font-size:9.5px; color:var(--muted); font-weight:700; }
  .nav .n .p { width:42px; height:26px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:17px; }
  .nav .n.on { color:var(--accent); }
  .nav .n.on .p { background:var(--accentSoft); }

  /* ride */
  .map { flex:1; position:relative; background:
     linear-gradient(90deg, rgba(0,0,0,.045) 1px, transparent 1px) 0 0/34px 34px,
     linear-gradient(0deg, rgba(0,0,0,.045) 1px, transparent 1px) 0 0/34px 34px, var(--mapbg); }
  .route { position:absolute; height:5px; width:150px; border-radius:3px; background:var(--accent); top:150px; right:40px; transform:rotate(26deg); }
  .pin { position:absolute; width:18px; height:18px; border-radius:50% 50% 50% 0; transform:rotate(-45deg); border:3px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,.3); }
  .pin.a { background:var(--ink); top:150px; right:36px; } .pin.b { background:var(--accent); top:100px; right:170px; }
  .sheet { background:var(--surface); border-radius:22px 22px 0 0; padding:16px 15px 16px; box-shadow:0 -6px 24px rgba(0,0,0,.12); }
  .grip { width:40px; height:5px; border-radius:3px; background:var(--border); margin:0 auto 13px; }
  .drv { display:flex; align-items:center; gap:11px; margin-top:13px; }
  .drv .da { width:46px; height:46px; border-radius:50%; background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; }
  .drv .dn { font-weight:900; font-size:14px; } .drv .dc { font-size:11px; color:var(--muted); margin-top:2px; }
  .drv .rate { margin-inline-start:auto; border:1px solid var(--border); border-radius:11px; padding:5px 9px; font-weight:900; font-size:12px; }
  .meta { display:flex; gap:9px; margin-top:13px; }
  .meta .m { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:9px 11px; }
  .meta .k { font-size:10px; color:var(--muted); } .meta .v { font-size:14px; font-weight:900; margin-top:2px; }

  .txn { display:flex; align-items:center; gap:10px; padding:10px 2px; border-bottom:1px solid var(--border); }
  .txn .ti { width:38px; height:38px; border-radius:12px; background:var(--accentSoft); display:flex; align-items:center; justify-content:center; font-size:17px; }
  .txn .tt { flex:1; } .txn .tt .a { font-weight:800; font-size:12.5px; } .txn .tt .b { font-size:10px; color:var(--muted); margin-top:1px; }
  .txn .am { font-weight:900; font-size:13px; } .am.pos { color:#0E9F6E; } .am.neg { color:var(--text); }
  .tabs { display:flex; gap:8px; padding:0 16px 12px; }
  .tabs .tb { font-size:12px; font-weight:800; padding:7px 14px; border-radius:999px; background:var(--surface); border:1px solid var(--border); color:var(--muted); }
  .tabs .tb.on { background:var(--accent); color:var(--onAccent); border-color:var(--accent); }
  .dualchips { display:flex; gap:5px; margin-top:10px; }
  .dualchips b { flex:1; text-align:center; font-size:10px; padding:6px; border-radius:8px; color:#fff; font-weight:800; }
</style>
</head>
<body>
<header class="top">
  <h1>رفيق — معرض التصاميم الكامل</h1>
  <p>٢٠ اتجاه تصميم، كل واحد معروض بـ ٤ شاشات داخلية حقيقية: <b>الرئيسية · تتبّع الرحلة · المحفظة · رحلاتي</b> — عشان تحكم على ترتيب الصفحات وشكلها الداخلي. بأعلى كل تصميم شعار «رفيق» بخط مميّز وثنائي اللغة (يتبدّل حسب لغة التطبيق). اختَر رقم الاتجاه اللي بدّك نعتمده.</p>
  <div class="jump" id="jump"></div>
</header>
<div class="wrap" id="wrap"></div>

<script>
const V = [
  {n:1, ar:'أونيكس', en:'Onyx — Ink + Signature Blue', ink:'#0F1216', accent:'#2F6BFF', onAccent:'#fff', bg:'#F4F6F8', map:'#EAF0F7', why:'أسود حبري رصين + أزرق واحد واثق. مظهر عالمي (أوبر/بولت)، والأقرب لكود التطبيق حالياً والأقل جهداً. توصيتي الأولى.'},
  {n:2, ar:'ثقة منتصف الليل', en:'Midnight Trust — Navy + Sky', ink:'#0D1B2A', accent:'#38BDF8', onAccent:'#06263A', bg:'#F5F7FA', map:'#E8EEF5', why:'كحلي عميق + سماوي. إحساس أمان ومؤسسية يناسب حمل طالبات وأموال.'},
  {n:3, ar:'الهوية الأردنية', en:'Jordan Heritage — Green + Sand', ink:'#08331F', accent:'#0B7A4B', onAccent:'#fff', bg:'#FAF7EF', map:'#EEEBDD', why:'أخضر أردني + رملي دافئ. هوية محليّة تربط المنصّة بالأردن — تميّز تسويقي قوي.'},
  {n:4, ar:'إندِيغو الجامعة', en:'Campus Indigo — Indigo + Amber', ink:'#1E1B4B', accent:'#4F46E5', onAccent:'#fff', bg:'#F5F5FB', map:'#ECECF7', why:'إندِيغو أكاديمي شبابي بتباين واضح، مناسب لجمهور طلابي.'},
  {n:5, ar:'أسلوب inDrive', en:'inDrive-style — Neutral + Lime', ink:'#111827', accent:'#C1F11D', onAccent:'#16210A', bg:'#F2F3F5', map:'#E9EBEE', why:'رمادي محايد + ليموني لزر واحد مهيمن. بساطة قصوى وجرأة.'},
  {n:6, ar:'زمرّدي متحرّك', en:'Emerald Motion — Emerald + Charcoal', ink:'#0F1B17', accent:'#059669', onAccent:'#fff', bg:'#F3F6F5', map:'#E6EEEA', why:'زمرّدي + فحمي يوحي بالحركة والموافقة، مريح ومقروء.'},
  {n:7, ar:'شروق كهرماني', en:'Sunrise Amber — Amber + Ink', ink:'#1C1917', accent:'#F97316', onAccent:'#fff', bg:'#FBF7F4', map:'#F1EAE3', why:'كهرماني دافئ وودود؛ يبرز أزرار الإجراء بقوة.'},
  {n:8, ar:'بنفسجي فاخر', en:'Violet Premium — Violet + Neutral', ink:'#2E1065', accent:'#7C3AED', onAccent:'#fff', bg:'#F6F4FD', map:'#EDE9F9', why:'بنفسجي ملكي عصري، مظهر premium مميّز عن المنافسين.'},
  {n:9, ar:'تركوازي هادئ', en:'Teal Calm — Teal + Ink', ink:'#0B1F1E', accent:'#0D9488', onAccent:'#fff', bg:'#F2F7F6', map:'#E4EFED', why:'تركوازي هادئ محايد الجندر، مريح للاستخدام اليومي.'},
  {n:10, ar:'أكسنت مزدوج', en:'Dual-Accent — Ink + per-role accent', ink:'#0F1216', accent:'#2F6BFF', onAccent:'#fff', bg:'#F4F6F8', map:'#EAF0F7', dual:true, why:'أساس إنك موحّد + لون لكل دور: طالب أزرق، كابتن أخضر، أدمن بنفسجي.'},
  {n:11, ar:'قرمزي جريء', en:'Crimson Drive — Red + Ink', ink:'#1A0E12', accent:'#E11D48', onAccent:'#fff', bg:'#FBF5F6', map:'#F1E6E9', why:'أحمر قرمزي جريء وطاقة عالية، لافت ويثبت بالذاكرة.'},
  {n:12, ar:'أعماق المحيط', en:'Ocean Deep — Deep Blue', ink:'#0A1F44', accent:'#1D4ED8', onAccent:'#fff', bg:'#F1F5FD', map:'#E3EBFA', why:'أزرق ملكي عميق، ثقة ورصانة كلاسيكية.'},
  {n:13, ar:'سليت احترافي', en:'Slate Pro — Slate + Blue', ink:'#1E293B', accent:'#3B82F6', onAccent:'#fff', bg:'#F4F6F9', map:'#E9EEF4', why:'رمادي-أزرق مؤسسي هادئ، احترافي جداً ومريح للعين.'},
  {n:14, ar:'نعناعي منعش', en:'Mint Fresh — Mint + Deep Green', ink:'#06281E', accent:'#10B981', onAccent:'#04231A', bg:'#F1F8F5', map:'#E2F0EA', why:'نعناعي منعش وحيوي، شبابي وخفيف.'},
  {n:15, ar:'غروب مرجاني', en:'Sunset Coral — Coral + Plum', ink:'#2A1220', accent:'#FB7185', onAccent:'#3A0A17', bg:'#FDF4F6', map:'#F6E7EB', why:'مرجاني دافئ عصري، ودّي ومختلف عن كل المنافسين.'},
  {n:16, ar:'ساعة ذهبية', en:'Golden Hour — Gold + Espresso', ink:'#2B211A', accent:'#D4A017', onAccent:'#2B211A', bg:'#FBF7EE', map:'#F0E9D8', why:'ذهبي فاخر + بنّي إسبريسو، إحساس رُقي وقيمة عالية.'},
  {n:17, ar:'سماوي كهربائي', en:'Electric Cyan — Cyan + Navy', ink:'#0A2233', accent:'#06B6D4', onAccent:'#04222E', bg:'#F0F8FA', map:'#E1F0F4', why:'سماوي كهربائي حديث وتقني، نظيف وواضح.'},
  {n:18, ar:'غابة ليمونية', en:'Forest Lime — Forest + Lime', ink:'#14311F', accent:'#84CC16', onAccent:'#14311F', bg:'#F5F8EF', map:'#EAF0DE', why:'أخضر غابة عميق + ليموني، طبيعي وحيوي بنفس الوقت.'},
  {n:19, ar:'وردي ليلي', en:'Rose Noir — Rose on Near-black', ink:'#14090C', accent:'#F43F5E', onAccent:'#fff', bg:'#FBF4F5', map:'#F0E4E7', why:'وردي على أسود، مظهر فاخر/عصري لافت جداً.'},
  {n:20, ar:'سماء ناعمة', en:'Sky Minimal — Airy White + Blue', ink:'#0F1B2D', accent:'#3B82F6', onAccent:'#fff', bg:'#FFFFFF', map:'#EEF3FB', why:'أبيض واسع نظيف جداً + أزرق ناعم، بساطة بأسلوب Apple.'},
];
const soft = h => h+'22';

function wmMark(v){ return `<span class="mark" style="background:${v.accent};color:${v.onAccent}">ر</span>`; }
function brandBar(v){
  return `<div class="brandbar" style="--wm-accent:${v.accent}">
    <div><div class="cap">عربي</div><span class="wm">${wmMark(v)}<span class="txt-ar" style="color:${v.accent}">رفيق<span class="dot">.</span></span></span></div>
    <div><div class="cap">English</div><span class="wm"><span class="mark" style="background:${v.accent};color:${v.onAccent};font-family:Sora">R</span><span class="txt-en" style="color:${v.accent}">Rafeeq<span class="dot">.</span></span></span></div>
    <div style="color:var(--fmuted);font-size:11px;line-height:1.6;max-width:230px">الشعار بخط <b>Reem Kufi</b> للعربي و<b>Sora</b> للإنجليزي، مع نقطة لون العلامة — ويتبدّل تلقائياً حسب لغة التطبيق.</div>
  </div>`;
}

function nav(active){ const items=[['🏠','الرئيسية'],['🚗','رحلاتي'],['💳','المحفظة'],['👤','حسابي']];
  return `<div class="nav">${items.map((it,i)=>`<div class="n ${i===active?'on':''}"><div class="p">${it[0]}</div>${it[1]}</div>`).join('')}</div>`; }

function scHome(v){ const dual=v.dual?`<div class="dualchips"><b style="background:#2F6BFF">طالب</b><b style="background:#16A34A">كابتن</b><b style="background:#7C3AED">أدمن</b></div>`:'';
  return `<div class="sb"><span>9:41</span><span>📶🔋</span></div>
  <div class="apphdr"><div class="wmini"><div class="m">ر</div><div class="w">رفيق</div></div><div class="av">ح</div></div>
  <div class="body">
    ${dual}
    <div class="hero"><div class="g"></div><div class="l">رصيد المحفظة</div><div class="b">12.500 <small>د.أ</small></div>
      <div class="row"><button class="qa solid">＋ شحن</button><button class="qa">سحب</button></div></div>
    <div class="tiles">
      <div class="tile"><div class="ic">🚗</div><div class="t">رحلة</div></div>
      <div class="tile"><div class="ic">🎫</div><div class="t">اشتراك</div></div>
      <div class="tile"><div class="ic">📦</div><div class="t">طرود</div></div>
      <div class="tile"><div class="ic">🎁</div><div class="t">مكافآت</div></div>
    </div>
    <div class="sec"><span>رحلتك القادمة</span><span class="more">الكل</span></div>
    <div class="triprow"><div class="rt"><div class="a">الجامعة الأردنية ← دابوق</div><div class="b">اليوم · 8:30 ص</div></div><span class="pill go">مؤكّدة</span></div>
    <button class="cta">🚕 اطلب رحلة الآن</button>
    <div style="height:12px"></div>
  </div>${nav(0)}`;
}
function scRide(v){ return `<div class="sb ink" style="position:absolute;top:0;left:0;right:0;z-index:5"><span>9:41</span><span>📶🔋</span></div>
  <div class="map"><div class="route"></div><div class="pin b"></div><div class="pin a"></div></div>
  <div class="sheet"><div class="grip"></div>
    <span class="pill go">● الكابتن في الطريق إليك</span>
    <div class="drv"><div class="da">ع</div><div><div class="dn">عمر خالد</div><div class="dc">كيا سيراتو · رمادي · ٤٢٧٩</div></div><div class="rate">⭐ 4.9</div></div>
