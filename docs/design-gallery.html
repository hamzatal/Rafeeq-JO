<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>رفيق — معرض التصاميم (10 اتجاهات)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root { --page-bg:#0b0e13; --panel:#151a22; --panel2:#1c232d; --line:#28303b; --ftext:#e8edf3; --fmuted:#95a1b2; }
  * { box-sizing: border-box; margin:0; padding:0; }
  body { font-family:'Cairo',system-ui,sans-serif; background:var(--page-bg); color:var(--ftext); padding:0 0 80px; }
  header.top { position:sticky; top:0; z-index:50; background:rgba(11,14,19,0.92); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); padding:18px 22px; }
  header.top h1 { font-size:22px; font-weight:900; letter-spacing:.3px; }
  header.top p { color:var(--fmuted); font-size:13.5px; margin-top:4px; line-height:1.7; }
  .switcher { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .switcher button { font-family:inherit; cursor:pointer; border:1px solid var(--line); background:var(--panel); color:var(--ftext); padding:8px 16px; border-radius:999px; font-weight:700; font-size:13px; transition:.15s; }
  .switcher button.active { background:#2F6BFF; border-color:#2F6BFF; color:#fff; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:22px; padding:24px 22px; max-width:1500px; margin:0 auto; }
  .variant { background:var(--panel); border:1px solid var(--line); border-radius:20px; padding:18px; }
  .variant .vhead { display:flex; align-items:flex-start; gap:10px; justify-content:space-between; margin-bottom:4px; }
  .variant .vnum { font-size:12px; font-weight:800; color:#fff; background:#2F6BFF; width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .variant h3 { font-size:17px; font-weight:800; }
  .variant .en { font-size:11.5px; color:var(--fmuted); font-weight:600; letter-spacing:.4px; }
  .variant .why { font-size:12.5px; color:var(--fmuted); line-height:1.75; margin:8px 0 12px; min-height:56px; }
  .swatches { display:flex; gap:6px; margin-bottom:14px; }
  .sw { flex:1; height:30px; border-radius:8px; border:1px solid rgba(255,255,255,.08); position:relative; }
  .sw span { position:absolute; bottom:-16px; right:0; font-size:9px; color:var(--fmuted); }
  .stage { display:flex; justify-content:center; padding-top:14px; }

  /* ---- phone ---- */
  .phone { width:290px; height:600px; background:#000; border-radius:40px; padding:9px; box-shadow:0 18px 40px rgba(0,0,0,.55); flex:0 0 auto; }
  .screen { width:100%; height:100%; border-radius:32px; overflow:hidden; position:relative; display:flex; flex-direction:column; background:var(--bg); color:var(--text); }
  .statusbar { display:flex; justify-content:space-between; align-items:center; padding:10px 18px 4px; font-size:12px; font-weight:700; color:var(--text); }
  .statusbar.onink { color:#fff; }

  /* welcome / splash */
  .s-welcome { background:var(--ink); color:#fff; align-items:center; justify-content:center; text-align:center; padding:30px; position:relative; overflow:hidden; }
  .glow { position:absolute; width:280px; height:280px; border-radius:50%; background:var(--accent); filter:blur(60px); opacity:.28; top:-70px; left:-60px; }
  .glow2 { position:absolute; width:240px; height:240px; border-radius:50%; background:var(--accent); filter:blur(70px); opacity:.14; bottom:-60px; right:-50px; }
  .logo-circle { width:92px; height:92px; border-radius:28px; background:#fff; display:flex; align-items:center; justify-content:center; font-size:44px; font-weight:900; color:var(--ink); z-index:2; box-shadow:0 10px 30px rgba(0,0,0,.4); }
  .ring { position:absolute; width:120px; height:120px; border-radius:50%; border:2.5px solid var(--accent); border-top-color:transparent; border-right-color:transparent; z-index:1; }
  .s-welcome .brand { font-size:40px; font-weight:900; margin-top:22px; z-index:2; }
  .s-welcome .tag { font-size:14px; color:rgba(255,255,255,.72); margin-top:8px; line-height:1.7; z-index:2; max-width:230px; }
  .w-actions { position:absolute; bottom:34px; left:24px; right:24px; z-index:2; }
  .btn { width:100%; height:52px; border-radius:15px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:15.5px; border:none; }
  .btn-primary { background:var(--accent); color:var(--onAccent); }
  .btn-ghost { background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.25); color:#fff; margin-top:12px; }

  /* home */
  .s-home { padding:6px 16px 0; overflow:hidden; }
  .h-head { display:flex; align-items:center; justify-content:space-between; padding:8px 2px 14px; }
  .h-head .hi { font-size:13px; color:var(--muted); }
  .h-head .name { font-size:18px; font-weight:800; margin-top:2px; }
  .avatar { width:42px; height:42px; border-radius:50%; background:var(--accent); color:var(--onAccent); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:16px; }
  .hero { background:var(--ink); color:#fff; border-radius:22px; padding:18px; position:relative; overflow:hidden; }
  .hero .glowmini { position:absolute; width:150px; height:150px; border-radius:50%; background:var(--accent); opacity:.22; filter:blur(35px); top:-40px; left:-30px; }
  .hero .lbl { font-size:12.5px; opacity:.8; }
  .hero .bal { font-size:30px; font-weight:900; margin-top:4px; }
  .hero .bal small { font-size:14px; font-weight:700; opacity:.75; }
  .hero .topup { margin-top:14px; background:var(--accent); color:var(--onAccent); border:none; height:40px; border-radius:12px; width:100%; font-weight:800; font-size:13.5px; }
  .tiles { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:18px; }
  .tile { text-align:center; }
  .tile .ic { width:56px; height:56px; margin:0 auto; border-radius:18px; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:24px; box-shadow:0 3px 10px rgba(0,0,0,.05); }
  .tile .tl { font-size:11px; margin-top:6px; color:var(--text); font-weight:600; }
  .sect { font-size:14px; font-weight:800; margin:18px 2px 10px; }
  .cta { width:100%; height:54px; border-radius:16px; background:var(--accent); color:var(--onAccent); border:none; font-weight:800; font-size:15.5px; display:flex; align-items:center; justify-content:center; gap:8px; }
  .nav { position:absolute; bottom:0; left:0; right:0; height:64px; background:var(--surface); border-top:1px solid var(--border); display:flex; }
  .nav .n { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; font-size:10px; color:var(--muted); font-weight:600; }
  .nav .n.on { color:var(--accent); }
  .nav .n.on .pill { background:var(--accentSoft); }
  .nav .pill { width:46px; height:30px; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:19px; }

  /* ride */
  .s-ride { position:relative; }
  .map { position:absolute; inset:0; background:
      linear-gradient(90deg, rgba(0,0,0,.04) 1px, transparent 1px) 0 0/38px 38px,
      linear-gradient(0deg, rgba(0,0,0,.04) 1px, transparent 1px) 0 0/38px 38px,
      var(--mapbg); }
  .route { position:absolute; height:5px; border-radius:3px; background:var(--accent); width:170px; top:210px; right:50px; transform:rotate(24deg); box-shadow:0 0 0 5px rgba(0,0,0,.03); }
  .pin { position:absolute; width:20px; height:20px; border-radius:50% 50% 50% 0; transform:rotate(-45deg); border:3px solid #fff; box-shadow:0 3px 8px rgba(0,0,0,.3); }
  .pin.a { background:var(--ink); top:200px; right:44px; }
  .pin.b { background:var(--accent); top:150px; right:200px; }
  .ridecard { position:absolute; bottom:0; left:0; right:0; background:var(--surface); border-radius:24px 24px 0 0; padding:20px 18px 24px; box-shadow:0 -8px 30px rgba(0,0,0,.14); }
  .grip { width:42px; height:5px; border-radius:3px; background:var(--border); margin:0 auto 16px; }
  .ridecard .st { display:inline-flex; align-items:center; gap:6px; background:var(--accentSoft); color:var(--accent); font-weight:800; font-size:12px; padding:6px 12px; border-radius:999px; }
  .driver { display:flex; align-items:center; gap:12px; margin-top:16px; }
  .driver .dav { width:52px; height:52px; border-radius:50%; background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:18px; }
  .driver .dn { font-weight:800; font-size:15px; }
  .driver .dc { font-size:12px; color:var(--muted); margin-top:2px; }
  .driver .rate { margin-inline-start:auto; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:6px 10px; font-weight:800; font-size:13px; }
  .ridemeta { display:flex; gap:10px; margin-top:16px; }
  .ridemeta .m { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:14px; padding:10px 12px; }
  .ridemeta .m .k { font-size:10.5px; color:var(--muted); }
  .ridemeta .m .v { font-size:15px; font-weight:800; margin-top:2px; }
  .ridecard .cta { margin-top:16px; }
  .note { text-align:center; color:var(--fmuted); font-size:13px; padding:8px 22px 0; }
  .dualchips { display:flex; gap:6px; margin-top:8px; }
  .dualchips b { flex:1; text-align:center; font-size:10px; padding:5px; border-radius:8px; color:#fff; font-weight:800; }
</style>
</head>
<body>
<header class="top">
  <h1>رفيق — معرض التصاميم</h1>
  <p>10 اتجاهات تصميم كاملة، معروضة كشاشات هاتف حقيقية بألوانها الفعلية (RTL). بدّل بين الشاشات لتقارن نفس الشاشة عبر كل الاتجاهات، واختر رقم الاتجاه اللي يعجبك.</p>
  <div class="switcher" id="sw">
    <button data-s="welcome" class="active">شاشة الترحيب / السبلاش</button>
    <button data-s="home">الشاشة الرئيسية</button>
    <button data-s="ride">تتبّع الرحلة</button>
  </div>
</header>
<div class="note" id="note"></div>
<div class="grid" id="grid"></div>

<script>
const VARIANTS = [
  { n:1,  ar:'أونيكس', en:'Onyx — Ink + Signature Blue', ink:'#0F1216', splash:'#0A0D12', accent:'#2F6BFF', onAccent:'#FFFFFF', bg:'#F4F6F8', mapbg:'#EAF0F7',
    why:'أسود حبري رصين + أزرق واحد واثق. مظهر عالمي (أوبر/بولت). هو الأقرب لكود التطبيق حالياً والأقل جهداً للتنفيذ. توصيتي الأولى.' },
  { n:2,  ar:'ثقة منتصف الليل', en:'Midnight Trust — Navy + Sky', ink:'#0D1B2A', splash:'#0D1B2A', accent:'#38BDF8', onAccent:'#06263A', bg:'#F5F7FA', mapbg:'#E8EEF5',
    why:'كحلي عميق + سماوي. إحساس «أمان ومؤسسية» يناسب منصّة تحمل طالبات وأموال. يوحي بالموثوقية.' },
  { n:3,  ar:'الهوية الأردنية', en:'Jordan Heritage — Green + Sand', ink:'#08331F', splash:'#08331F', accent:'#0B7A4B', onAccent:'#FFFFFF', bg:'#FAF7EF', mapbg:'#EFEDE0',
    why:'أخضر أردني + رملي ذهبي خفيف. هوية محليّة تربط المنصّة بالأردن والجامعات — تميّز تسويقي قوي.' },
  { n:4,  ar:'إندِيغو الجامعة', en:'Campus Indigo — Indigo + Amber', ink:'#1E1B4B', splash:'#1E1B4B', accent:'#4F46E5', onAccent:'#FFFFFF', bg:'#F5F5FB', mapbg:'#ECECF7',
    why:'إندِيغو أكاديمي + كهرماني. شبابي/جامعي حيوي بتباين واضح، مناسب لجمهور طلابي.' },
  { n:5,  ar:'أسلوب inDrive', en:'inDrive-style — Neutral + Lime', ink:'#111827', splash:'#111827', accent:'#C1F11D', onAccent:'#16210A', bg:'#F2F3F5', mapbg:'#E9EBEE',
    why:'قماشة رمادية محايدة + أخضر ليموني لزر واحد مهيمن. بساطة قصوى وجرأة. (كان مُجرّباً وأُلغي — يعود إن أردت الجرأة).' },
  { n:6,  ar:'زمرّدي متحرّك', en:'Emerald Motion — Emerald + Charcoal', ink:'#0F1B17', splash:'#0F1B17', accent:'#059669', onAccent:'#FFFFFF', bg:'#F3F6F5', mapbg:'#E6EEEA',
    why:'زمرّدي + فحمي. يوحي بالحركة/السرعة/الموافقة بصرياً، مريح ومقروء بامتياز.' },
  { n:7,  ar:'شروق كهرماني', en:'Sunrise Amber — Amber + Ink', ink:'#1C1917', splash:'#1C1917', accent:'#F97316', onAccent:'#FFFFFF', bg:'#FBF7F4', mapbg:'#F1EAE3',
    why:'كهرماني دافئ + إنك. ودود ودافئ ومناسب لتطبيق طلابي؛ الكهرماني يبرز أزرار الإجراء بقوة.' },
  { n:8,  ar:'بنفسجي فاخر', en:'Violet Premium — Violet + Neutral', ink:'#2E1065', splash:'#2E1065', accent:'#7C3AED', onAccent:'#FFFFFF', bg:'#F6F4FD', mapbg:'#EDE9F9',
    why:'بنفسجي ملكي + محايد. مظهر «premium/tech» عصري ومميّز عن منافسي النقل التقليديين.' },
  { n:9,  ar:'تركوازي هادئ', en:'Teal Calm — Teal + Ink', ink:'#0B1F1E', splash:'#0B1F1E', accent:'#0D9488', onAccent:'#FFFFFF', bg:'#F2F7F6', mapbg:'#E4EFED',
    why:'تركوازي هادئ + حبري. لون واثق محايد الجندر، مريح للاستخدام اليومي المتكرّر.' },
  { n:10, ar:'أكسنت مزدوج', en:'Dual-Accent — Ink base per-role accent', ink:'#0F1216', splash:'#0A0D12', accent:'#2F6BFF', onAccent:'#FFFFFF', bg:'#F4F6F8', mapbg:'#EAF0F7', dual:true,
    why:'أساس إنك موحّد + لون accent مختلف لكل دور: الطالب أزرق، الكابتن أخضر، الأدمن بنفسجي. أقوى تمييز بين الأدوار مع عائلة واحدة.' },
];

function softColor(hex){ return hex + '22'; } // ~13% alpha

function screenWelcome(v){ return `
  <div class="statusbar onink"><span>9:41</span><span>📶 🔋</span></div>
  <div class="s-welcome" style="flex:1">
    <div class="glow"></div><div class="glow2"></div>
    <div class="ring"></div>
    <div class="logo-circle">ر</div>
    <div class="brand">رفيق</div>
    <div class="tag">النقل والخدمات الجامعية الذكية في الأردن</div>
    <div class="w-actions">
      <button class="btn btn-primary">إنشاء حساب</button>
      <button class="btn btn-ghost">تسجيل الدخول</button>
    </div>
  </div>`;
}
function screenHome(v){
  const dual = v.dual ? `<div class="dualchips"><b style="background:#2F6BFF">طالب</b><b style="background:#16A34A">كابتن</b><b style="background:#7C3AED">أدمن</b></div>` : '';
  return `
  <div class="statusbar"><span>9:41</span><span>📶 🔋</span></div>
  <div class="s-home" style="flex:1; overflow:hidden; padding-bottom:70px">
    <div class="h-head">
      <div><div class="hi">مساء الخير 👋</div><div class="name">حمزة</div>${dual}</div>
      <div class="avatar">ح</div>
    </div>
    <div class="hero">
      <div class="glowmini"></div>
      <div class="lbl">رصيد المحفظة</div>
      <div class="bal">12.500 <small>د.أ</small></div>
      <button class="topup">＋ شحن الرصيد</button>
    </div>
    <div class="tiles">
      <div class="tile"><div class="ic">🚗</div><div class="tl">رحلة</div></div>
      <div class="tile"><div class="ic">💳</div><div class="tl">اشتراك</div></div>
      <div class="tile"><div class="ic">📦</div><div class="tl">طرود</div></div>
      <div class="tile"><div class="ic">🎁</div><div class="tl">مكافآت</div></div>
    </div>
    <div class="sect">اطلب رحلتك</div>
    <button class="cta">🚕 اطلب رحلة الآن</button>
  </div>
  <div class="nav">
    <div class="n on"><div class="pill">🏠</div>الرئيسية</div>
    <div class="n"><div class="pill">🚗</div>رحلاتي</div>
    <div class="n"><div class="pill">💳</div>المحفظة</div>
    <div class="n"><div class="pill">👤</div>حسابي</div>
  </div>`;
}
function screenRide(v){ return `
  <div class="statusbar"><span>9:41</span><span>📶 🔋</span></div>
  <div class="s-ride" style="flex:1">
    <div class="map"></div>
    <div class="route"></div>
    <div class="pin b"></div>
    <div class="pin a"></div>
    <div class="ridecard">
      <div class="grip"></div>
      <div class="st">● الكابتن في الطريق إليك</div>
      <div class="driver">
        <div class="dav">ع</div>
        <div><div class="dn">عمر خالد</div><div class="dc">كيا سيراتو · رمادي · ٤٢٧٩</div></div>
        <div class="rate">⭐ 4.9</div>
      </div>
      <div class="ridemeta">
        <div class="m"><div class="k">الوصول خلال</div><div class="v">٣ دقائق</div></div>
        <div class="m"><div class="k">التكلفة</div><div class="v">١.٧٥ د.أ</div></div>
      </div>
      <button class="cta">📞 تواصل مع الكابتن</button>
    </div>
  </div>`;
}

function render(screen){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('note').textContent =
    screen==='welcome' ? 'الشاشة المعروضة: الترحيب/السبلاش (الخلفية الداكنة = هوية كل اتجاه).' :
    screen==='home' ? 'الشاشة المعروضة: الرئيسية (بطاقة المحفظة + الخدمات + زر الطلب + الشريط السفلي).' :
    'الشاشة المعروضة: تتبّع الرحلة (الخريطة + بطاقة حالة الرحلة + بيانات الكابتن).';
  VARIANTS.forEach(v=>{
    const vars = `--ink:${v.ink}; --accent:${v.accent}; --onAccent:${v.onAccent}; --bg:${v.bg}; --surface:#FFFFFF; --text:#0F1216; --muted:#6B7280; --border:#E6E9EF; --accentSoft:${softColor(v.accent)}; --mapbg:${v.mapbg};`;
    const inner = screen==='welcome'?screenWelcome(v):screen==='home'?screenHome(v):screenRide(v);
    const el = document.createElement('div');
    el.className='variant';
    el.innerHTML = `
      <div class="vhead"><div><h3>${v.ar}</h3><div class="en">${v.en}</div></div><div class="vnum">${v.n}</div></div>
      <div class="why">${v.why}</div>
      <div class="swatches">
        <div class="sw" style="background:${v.ink}"><span>إنك</span></div>
        <div class="sw" style="background:${v.accent}"><span>أكسنت</span></div>
        <div class="sw" style="background:${v.bg}"><span>خلفية</span></div>
        <div class="sw" style="background:#12B76A"><span>نجاح</span></div>
        <div class="sw" style="background:#F04438"><span>خطر</span></div>
      </div>
      <div class="stage"><div class="phone"><div class="screen" style="${vars}">${inner}</div></div></div>`;
    grid.appendChild(el);
  });
}

document.getElementById('sw').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  document.querySelectorAll('#sw button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  render(b.dataset.s);
});
render('welcome');
</script>
</body>
</html>
